<div id="site-edit-toolbar" class="site-edit-toolbar" data-source-path="{{ page.path }}">
  <div class="edit-toolbar-inner">
    <strong>Edit mode</strong>

    <button id="edit-login-token" type="button">Login token</button>
    <button id="edit-current-page" type="button">Edit this page</button>
    <button id="edit-new-scientific" type="button">New scientific post</button>
    <button id="edit-new-personal" type="button">New personal post</button>
    <button id="edit-new-project" type="button">New project</button>
    <button id="edit-delete-current-page" type="button">Delete this page</button>
    <button id="edit-upload-image" type="button">Upload image</button>

    <a href="https://github.dev/nicobonacorsi/nicobonacorsi.github.io" target="_blank" rel="noopener">
      Full editor
    </a>

    <button id="hide-edit-toolbar" type="button">Hide</button>
  </div>
</div>

<div id="site-edit-modal" class="site-edit-modal" aria-hidden="true">
  <div class="site-edit-modal-card">
    <div class="site-edit-modal-head">
      <h2 id="site-edit-modal-title">Edit</h2>
      <button id="site-edit-modal-close" type="button">×</button>
    </div>

    <div id="site-edit-modal-body"></div>

    <div class="site-edit-modal-actions">
      <button id="site-edit-modal-save" type="button">Save to GitHub</button>
      <button id="site-edit-modal-cancel" type="button">Cancel</button>
    </div>
  </div>
</div>

<style>

</style>

<script>
  (function () {
    const OWNER = "nicobonacorsi";
    const REPO = "nicobonacorsi.github.io";
    const BRANCH = "main";
    const API_ROOT = `https://api.github.com/repos/${OWNER}/${REPO}/contents`;

    const params = new URLSearchParams(window.location.search);
    const editMode = params.get("edit") === "1";

    const toolbar = document.getElementById("site-edit-toolbar");
    const modal = document.getElementById("site-edit-modal");
    const modalTitle = document.getElementById("site-edit-modal-title");
    const modalBody = document.getElementById("site-edit-modal-body");
    const modalSave = document.getElementById("site-edit-modal-save");
    const modalCancel = document.getElementById("site-edit-modal-cancel");
    const modalClose = document.getElementById("site-edit-modal-close");

    let currentSaveHandler = null;

    if (!toolbar || !editMode) return;

    toolbar.classList.add("is-visible");

    function getToken() {
      return sessionStorage.getItem("github_edit_token") || "";
    }

    function setToken(token) {
      sessionStorage.setItem("github_edit_token", token);
    }

    function requireToken() {
      const existing = getToken();
      if (existing) return existing;

      const token = window.prompt(
        "Paste your GitHub fine-grained token. It will be stored only in this browser tab session."
      );

      if (!token) {
        throw new Error("Missing GitHub token.");
      }

      setToken(token.trim());
      return token.trim();
    }

    function headers() {
      return {
        "Accept": "application/vnd.github+json",
        "Authorization": `Bearer ${requireToken()}`,
        "X-GitHub-Api-Version": "2022-11-28"
      };
    }

    function toBase64(str) {
      return btoa(unescape(encodeURIComponent(str)));
    }

    function fromBase64(str) {
      return decodeURIComponent(escape(atob(str.replace(/\n/g, ""))));
    }

    function slugify(text) {
      return text
        .toString()
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "")
        .substring(0, 80);
    }

    function todayISO() {
      return new Date().toISOString().slice(0, 10);
    }

    function openModal(title, html, saveHandler) {
      modalTitle.textContent = title;
      modalBody.innerHTML = html;
      currentSaveHandler = saveHandler;
      modal.classList.add("is-visible");
      modal.setAttribute("aria-hidden", "false");
    }

    function closeModal() {
      modal.classList.remove("is-visible");
      modal.setAttribute("aria-hidden", "true");
      modalBody.innerHTML = "";
      currentSaveHandler = null;
    }

    function setStatus(text) {
      const existing = document.getElementById("site-edit-status");
      if (existing) {
        existing.textContent = text;
        return;
      }

      const div = document.createElement("div");
      div.id = "site-edit-status";
      div.className = "site-edit-status";
      div.textContent = text;
      modalBody.prepend(div);
    }

    async function getFile(path) {
      const res = await fetch(`${API_ROOT}/${encodeURIComponent(path).replaceAll("%2F", "/")}?ref=${BRANCH}`, {
        headers: headers()
      });

      if (!res.ok) {
        throw new Error(`Could not read ${path}. GitHub returned ${res.status}.`);
      }

      const data = await res.json();
      return {
        sha: data.sha,
        content: fromBase64(data.content || "")
      };
    }

    async function getExistingSha(path) {
      const res = await fetch(`${API_ROOT}/${encodeURIComponent(path).replaceAll("%2F", "/")}?ref=${BRANCH}`, {
        headers: headers()
      });

      if (res.status === 404) {
        return null;
      }

      if (!res.ok) {
        return null;
      }

      const data = await res.json();
      return data.sha || null;
    }

    async function putFile(path, content, message, sha) {
      if (!sha) {
        sha = await getExistingSha(path);
      }

      const body = {
        message: message,
        content: toBase64(content),
        branch: BRANCH
      };

      if (sha) {
        body.sha = sha;
      }

      const res = await fetch(`${API_ROOT}/${encodeURIComponent(path).replaceAll("%2F", "/")}`, {
        method: "PUT",
        headers: {
          ...headers(),
          "Content-Type": "application/json"
        },
        body: JSON.stringify(body)
      });

      if (!res.ok) {
        const err = await res.text();
        throw new Error(`Could not save ${path}. GitHub returned ${res.status}: ${err}`);
      }

      return await res.json();
    }

    async function deleteFile(path, message) {
      const sha = await getExistingSha(path);

      if (!sha) {
        throw new Error(`Could not delete ${path}. File was not found on GitHub.`);
      }

      const res = await fetch(`${API_ROOT}/${encodeURIComponent(path).replaceAll("%2F", "/")}`, {
        method: "DELETE",
        headers: {
          ...headers(),
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          message: message,
          sha: sha,
          branch: BRANCH
        })
      });

      if (!res.ok) {
        const err = await res.text();
        throw new Error(`Could not delete ${path}. GitHub returned ${res.status}: ${err}`);
      }

      return await res.json();
    }

    async function editCurrentPage() {
      let path = toolbar.dataset.sourcePath || "index.html";

      if (!path || path === "undefined") {
        path = "index.html";
      }

      openModal(
        `Edit ${path}`,
        `
          <div class="site-edit-field">
            <label>File path</label>
            <input id="edit-file-path" value="${path}">
            <div class="site-edit-help">
              This edits the source file in GitHub. For blog posts, this is the Markdown file.
            </div>
          </div>

          <div class="site-edit-field">
            <label>Content</label>
            <textarea id="edit-file-content">Loading...</textarea>
          </div>
        `,
        async function () {
          const filePath = document.getElementById("edit-file-path").value.trim();
          const content = document.getElementById("edit-file-content").value;
          setStatus("Saving to GitHub...");
          const latest = await getFile(filePath);
          await putFile(filePath, content, `Edit ${filePath} from site edit mode`, latest.sha);
          setStatus("Saved. GitHub Actions will rebuild the site in about 1–2 minutes.");
        }
      );

      try {
        setStatus("Reading file from GitHub...");
        const file = await getFile(path);
        document.getElementById("edit-file-content").value = file.content;
        setStatus("Loaded. Edit the text, then click Save to GitHub.");
      } catch (e) {
        setStatus(e.message);
      }
    }

    function newScientificPost() {
      const date = todayISO();

      openModal(
        "New scientific post",
        `
          <div class="site-edit-field">
            <label>Title</label>
            <input id="new-title" placeholder="A New Research Note">
          </div>

          <div class="site-edit-field">
            <label>Date</label>
            <input id="new-date" value="${date}">
          </div>

          <div class="site-edit-field">
            <label>Scientific type</label>
            <select id="new-scientific-type">
              <option>Research Notes</option>
              <option>Course Notes</option>
              <option>Discovery Ideas</option>
            </select>
          </div>

          <div class="site-edit-field">
            <label>Tags</label>
            <input id="new-tags" placeholder="Probability, Stochastic Control, Optimal Stopping">
            <div class="site-edit-help">
              Separate tags with commas.
            </div>
          </div>

          <div class="site-edit-field">
            <label>Body</label>
            <textarea id="new-body">Write your post here.

You can write inline LaTeX like $X_t$.

You can write display LaTeX:

$$
dX_t = \\mu(X_t)\\,dt + \\sigma(X_t)\\,dW_t.
$$

You can write numbered equations and references:

The value function satisfies Equation \\eqref{eq:value}.

\\begin{equation}
V(x)
=
\\sup_{\\tau}
\\mathbb E_x\\left[e^{-r\\tau} g(X_\\tau)\\right].
\\label{eq:value}
\\end{equation}
</textarea>
          </div>
        `,
        async function () {
          const title = document.getElementById("new-title").value.trim();
          const postDate = document.getElementById("new-date").value.trim();
          const scientificType = document.getElementById("new-scientific-type").value.trim();
          const tags = document.getElementById("new-tags").value
            .split(",")
            .map(t => t.trim())
            .filter(Boolean);
          const body = document.getElementById("new-body").value;

          if (!title) throw new Error("Title is required.");

          const filename = `_posts/${postDate}-${slugify(title)}.md`;

          const content = `---
layout: post
title: "${title.replaceAll('"', '\\"')}"
date: ${postDate}
categories: [scientific]
scientific_type: "${scientificType}"
tags: [${tags.map(t => `"${t.replaceAll('"', '\\"')}"`).join(", ")}]
math: true
---

${body}
`;

          setStatus(`Creating ${filename}...`);
          await putFile(filename, content, `Create scientific post: ${title}`);
          setStatus("Scientific post created. GitHub Actions will rebuild the site in about 1–2 minutes.");
        }
      );
    }

    function newPersonalPost() {
      const date = todayISO();

      openModal(
        "New personal post",
        `
          <div class="site-edit-field">
            <label>Title</label>
            <input id="new-title" placeholder="A Personal Note">
          </div>

          <div class="site-edit-field">
            <label>Date</label>
            <input id="new-date" value="${date}">
          </div>

          <div class="site-edit-field">
            <label>City</label>
            <input id="new-city" value="New York">
          </div>

          <div class="site-edit-field">
            <label>Tags / topics</label>
            <input id="new-tags" placeholder="Travel, Photography, Friends">
            <div class="site-edit-help">
              Separate tags with commas.
            </div>
          </div>

          <div class="site-edit-field">
            <label>Body</label>
            <textarea id="new-body">Write your personal post here.

You can add an image after uploading it:

![description](/images/uploads/my-image.jpg)
</textarea>
          </div>
        `,
        async function () {
          const title = document.getElementById("new-title").value.trim();
          const postDate = document.getElementById("new-date").value.trim();
          const city = document.getElementById("new-city").value.trim() || "Unspecified";
          const tags = document.getElementById("new-tags").value
            .split(",")
            .map(t => t.trim())
            .filter(Boolean);
          const body = document.getElementById("new-body").value;

          if (!title) throw new Error("Title is required.");

          const filename = `_posts/${postDate}-${slugify(title)}.md`;

          const content = `---
layout: post
title: "${title.replaceAll('"', '\\"')}"
date: ${postDate}
categories: [personal]
city: "${city.replaceAll('"', '\\"')}"
tags: [${tags.map(t => `"${t.replaceAll('"', '\\"')}"`).join(", ")}]
---

${body}
`;

          setStatus(`Creating ${filename}...`);
          await putFile(filename, content, `Create personal post: ${title}`);
          setStatus("Personal post created. GitHub Actions will rebuild the site in about 1–2 minutes.");
        }
      );
    }

    function newProject() {
      const date = todayISO();

      openModal(
        "New project",
        `
          <div class="site-edit-field">
            <label>Project title</label>
            <input id="new-project-title" placeholder="My New Project">
          </div>

          <div class="site-edit-field">
            <label>Date</label>
            <input id="new-project-date" value="${date}">
          </div>

          <div class="site-edit-field">
            <label>Topics</label>
            <input id="new-project-topics" placeholder="Probability, Stochastic Control, Information Theory">
            <div class="site-edit-help">Separate topics with commas.</div>
          </div>

          <div class="site-edit-field">
            <label>Image path</label>
            <input id="new-project-image" placeholder="/images/uploads/project-image.jpg">
            <div class="site-edit-help">Optional. Upload the image first, then paste its path here.</div>
          </div>

          <div class="site-edit-field">
            <label>Question</label>
            <input id="new-project-question" placeholder="What is the main question?">
          </div>

          <div class="site-edit-field">
            <label>Key idea</label>
            <input id="new-project-keyidea" placeholder="What is the central idea?">
          </div>

          <div class="site-edit-field">
            <label>Results</label>
            <input id="new-project-results" placeholder="What did this project achieve?">
          </div>

          <div class="site-edit-field">
            <label>Body</label>
            <textarea id="new-project-body">Write the project page here.

You can use LaTeX:

\\begin{equation}
V(x)
=
\\sup_{\\tau}
\\mathbb E_x\\left[e^{-r\\tau} g(X_\\tau)\\right].
\\label{eq:value}
\\end{equation}

Then refer to Equation \\eqref{eq:value}.
</textarea>
          </div>
        `,
        async function () {
          const title = document.getElementById("new-project-title").value.trim();
          const postDate = document.getElementById("new-project-date").value.trim();
          const topics = document.getElementById("new-project-topics").value
            .split(",")
            .map(t => t.trim())
            .filter(Boolean);
          const image = document.getElementById("new-project-image").value.trim();
          const question = document.getElementById("new-project-question").value.trim();
          const keyIdea = document.getElementById("new-project-keyidea").value.trim();
          const results = document.getElementById("new-project-results").value.trim();
          const body = document.getElementById("new-project-body").value;

          if (!title) throw new Error("Project title is required.");

          const slug = slugify(title);
          const filename = `_projects/${slug}.md`;

          const yamlList = topics.map(t => `"${t.replaceAll('"', '\\"')}"`).join(", ");

          const content = `---
layout: project
title: "${title.replaceAll('"', '\\"')}"
date: ${postDate}
author: "Nicolò Bonacorsi"
topics: [${yamlList}]
${image ? `image: "${image.replaceAll('"', '\\"')}"` : ""}
question: "${question.replaceAll('"', '\\"')}"
key_idea: "${keyIdea.replaceAll('"', '\\"')}"
results: "${results.replaceAll('"', '\\"')}"
math: true
---

${body}
`;

          setStatus(`Creating ${filename}...`);
          await putFile(filename, content, `Create project: ${title}`);
          setStatus("Project created. GitHub Actions will rebuild the site in about 1–2 minutes.");
        }
      );
    }

    async function deleteCurrentPage() {
      let path = toolbar.dataset.sourcePath || "";

      if (!path || path === "index.html" || path === "projects.html" || path.startsWith("blog/")) {
        alert("Open the specific post or project page first, then use ?edit=1 and Delete this page. I will not delete index pages from here.");
        return;
      }

      if (!(path.startsWith("_posts/") || path.startsWith("_projects/"))) {
        alert("For safety, this delete button only deletes blog posts and project files.");
        return;
      }

      const ok = confirm(`Delete this file from GitHub?\n\n${path}\n\nThis cannot be undone from the website.`);
      if (!ok) return;

      openModal(
        `Delete ${path}`,
        `<div class="site-edit-status">Ready to delete ${path}.</div>`,
        async function () {
          setStatus("Deleting from GitHub...");
          await deleteFile(path, `Delete ${path} from site edit mode`);
          setStatus("Deleted. GitHub Actions will rebuild the site in about 1–2 minutes.");
        }
      );
    }

    function uploadImage() {
      openModal(
        "Upload image",
        `
          <div class="site-edit-field">
            <label>Choose image</label>
            <input id="upload-image-file" type="file" accept="image/*">
          </div>

          <div class="site-edit-field">
            <label>Save as filename</label>
            <input id="upload-image-name" placeholder="my-image.jpg">
            <div class="site-edit-help">
              The image will be saved in images/uploads/. After upload, use it as:
              ![description](/images/uploads/filename.jpg)
            </div>
          </div>
        `,
        async function () {
          const fileInput = document.getElementById("upload-image-file");
          const nameInput = document.getElementById("upload-image-name");

          const file = fileInput.files[0];
          if (!file) throw new Error("Choose an image first.");

          const safeName = (nameInput.value.trim() || file.name)
            .replace(/[^a-zA-Z0-9._-]/g, "-");

          const path = `images/uploads/${safeName}`;

          const dataUrl = await new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(file);
          });

          const base64Content = String(dataUrl).split(",")[1];

          const existingImageSha = await getExistingSha(path);

          const imageBody = {
            message: `Upload image ${safeName} from site edit mode`,
            content: base64Content,
            branch: BRANCH
          };

          if (existingImageSha) {
            imageBody.sha = existingImageSha;
          }

          const res = await fetch(`${API_ROOT}/${encodeURIComponent(path).replaceAll("%2F", "/")}`, {
            method: "PUT",
            headers: {
              ...headers(),
              "Content-Type": "application/json"
            },
            body: JSON.stringify(imageBody)
          });

          if (!res.ok) {
            const err = await res.text();
            throw new Error(`Could not upload image. GitHub returned ${res.status}: ${err}`);
          }

          setStatus(`Uploaded. Use this in a post: ![description](/images/uploads/${safeName})`);
        }
      );
    }

    document.getElementById("edit-login-token")?.addEventListener("click", function () {
      const token = window.prompt(
        "Paste your GitHub fine-grained token. It will be stored only in this browser tab session.",
        getToken()
      );

      if (token) {
        setToken(token.trim());
        alert("Token saved for this browser tab.");
      }
    });

    document.getElementById("edit-current-page")?.addEventListener("click", function () {
      editCurrentPage();
    });

    document.getElementById("edit-new-scientific")?.addEventListener("click", function () {
      newScientificPost();
    });

    document.getElementById("edit-new-personal")?.addEventListener("click", function () {
      newPersonalPost();
    });

    document.getElementById("edit-new-project")?.addEventListener("click", function () {
      newProject();
    });

    document.getElementById("edit-delete-current-page")?.addEventListener("click", function () {
      deleteCurrentPage();
    });

    document.getElementById("edit-upload-image")?.addEventListener("click", function () {
      uploadImage();
    });

    document.getElementById("hide-edit-toolbar")?.addEventListener("click", function () {
      toolbar.classList.remove("is-visible");
    });

    modalCancel?.addEventListener("click", closeModal);
    modalClose?.addEventListener("click", closeModal);

    modalSave?.addEventListener("click", async function () {
      if (!currentSaveHandler) return;

      try {
        modalSave.disabled = true;
        await currentSaveHandler();
      } catch (e) {
        setStatus(e.message);
      } finally {
        modalSave.disabled = false;
      }
    });
  })();
</script>
