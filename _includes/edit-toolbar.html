<div id="site-edit-toolbar" class="site-edit-toolbar" data-source-path="{{ page.path }}">
  <div class="edit-toolbar-inner">
    <strong>Edit mode</strong>

    <button id="edit-login-token" type="button">Login token</button>
    <button id="edit-current-page" type="button">Edit this page</button>
    <button id="edit-manage-content" type="button">Manage content</button>
    <button id="edit-new-scientific" type="button">New scientific post</button>
    <button id="edit-new-personal" type="button">New personal post</button>
    <button id="edit-new-project" type="button">New project</button>
    <button id="edit-new-paper" type="button">New paper</button>
    <button id="edit-upload-image" type="button">Upload media/file</button>

    <a href="https://github.dev/nicobonacorsi/nicobonacorsi.github.io" target="_blank" rel="noopener">
      Full editor
    </a>

    <button id="hide-edit-toolbar" type="button">Hide</button>
  </div>
</div>

<div id="site-edit-modal" class="site-edit-modal" aria-hidden="true">
  <div class="site-edit-modal-card">
    <div class="site-edit-modal-head">
      <h2 id="site-edit-modal-title">Edit</h2>
      <button id="site-edit-modal-close" type="button">×</button>
    </div>

    <div id="site-edit-modal-body"></div>

    <div class="site-edit-modal-actions">
      <button id="site-edit-modal-save" type="button">Save to GitHub</button>
      <button id="site-edit-modal-cancel" type="button">Close</button>
    </div>
  </div>
</div>

<style>

    display: none;
    position: fixed;
    left: 50%;
    bottom: 22px;
    transform: translateX(-50%);
    z-index: 99999;
    width: min(1180px, calc(100vw - 28px));
    font-family: inherit;
  }

  .site-edit-toolbar.is-visible {
    display: block;
  }

  .edit-toolbar-inner {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: .55rem;
    padding: .75rem .9rem;
    border: 1px solid rgba(0,0,0,.12);
    border-radius: 999px;
    background: rgba(255,255,255,.94);
    box-shadow: 0 16px 45px rgba(0,0,0,.14);
    backdrop-filter: blur(12px);
  }

  .edit-toolbar-inner strong {
    color: #111;
    margin-right: .2rem;
  }

  .edit-toolbar-inner a,
  .edit-toolbar-inner button,
  .site-edit-modal button {
    border: 1px solid rgba(0,0,0,.12);
    border-radius: 999px;
    background: #111;
    color: #fff !important;
    padding: .42rem .75rem;
    font-size: .88rem;
    line-height: 1;
    text-decoration: none !important;
    cursor: pointer;
    font-family: inherit;
  }

  .edit-toolbar-inner a:hover,
  .edit-toolbar-inner button:hover,
  .site-edit-modal button:hover {
    background: #000;
    color: #fff !important;
  }

  #hide-edit-toolbar,
  #site-edit-modal-cancel,
  #site-edit-modal-close {
    background: #f4f4f4;
    color: #333 !important;
  }

  #hide-edit-toolbar:hover,
  #site-edit-modal-cancel:hover,
  #site-edit-modal-close:hover {
    background: #e9e9e9;
    color: #111 !important;
  }

  .site-edit-modal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100000;
    background: rgba(0,0,0,.34);
    padding: 2rem;
  }

  .site-edit-modal.is-visible {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .site-edit-modal-card {
    width: min(1060px, 100%);
    max-height: 88vh;
    overflow: auto;
    border-radius: 22px;
    background: #fff;
    box-shadow: 0 24px 80px rgba(0,0,0,.25);
    padding: 1.2rem;
  }

  .site-edit-modal-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    border-bottom: 1px solid rgba(0,0,0,.08);
    padding-bottom: .8rem;
    margin-bottom: 1rem;

  .site-edit-modal-head h2 {
    font-size: 1.45rem;
    margin: 0;
    font-weight: 600;

  .site-edit-field label {

  }

  .site-edit-field input,
  .site-edit-field select,
  .site-edit-field textarea {

    color: #666;

  .site-edit-modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: .6rem;
    border-top: 1px solid rgba(0,0,0,.08);

  .site-edit-status {
    padding: .7rem .85rem;
    border-radius: 12px;

  }

  .content-manager-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: .5rem;
    margin-bottom: 1rem;
  }

  .content-manager-list {
    display: grid;
    gap: .7rem;
  }

  .content-manager-item {
    border: 1px solid rgba(0,0,0,.1);
    border-radius: 14px;
    padding: .85rem;
    background: #fafafa;
  }

  .content-manager-item-title {
    font-weight: 700;
    margin-bottom: .25rem;
  }

  .content-manager-item-path {
    color: #666;
    font-size: .86rem;
    overflow-wrap: anywhere;
    margin-bottom: .65rem;
  }

  .content-manager-item-actions {
    display: flex;
    flex-wrap: wrap;
    gap: .45rem;
  }

  .danger-button {
    background: #8b1a1a !important;
    color: #fff !important;
  }

  .danger-button:hover {
    background: #651111 !important;
  }

  @media (max-width: 720px) {
    .site-edit-toolbar {
      bottom: 12px;
    }

    .edit-toolbar-inner {
      border-radius: 22px;
    }

    .site-edit-modal {
      padding: .8rem;
    }
  }
</style>

<script>
  (function () {
    const OWNER = "nicobonacorsi";
    const REPO = "nicobonacorsi.github.io";
    const BRANCH = "main";
    const API_ROOT = `https://api.github.com/repos/${OWNER}/${REPO}/contents`;

    const params = new URLSearchParams(window.location.search);
    const editMode = params.get("edit") === "1";

    const toolbar = document.getElementById("site-edit-toolbar");
    const modal = document.getElementById("site-edit-modal");
    const modalTitle = document.getElementById("site-edit-modal-title");
    const modalBody = document.getElementById("site-edit-modal-body");
    const modalSave = document.getElementById("site-edit-modal-save");
    const modalCancel = document.getElementById("site-edit-modal-cancel");
    const modalClose = document.getElementById("site-edit-modal-close");

    let currentSaveHandler = null;

    if (!toolbar || !editMode) return;

    toolbar.classList.add("is-visible");

    function getToken() {
      return sessionStorage.getItem("github_edit_token") || "";
    }

    function setToken(token) {
      sessionStorage.setItem("github_edit_token", token);
    }

    function requireToken() {
      const existing = getToken();
      if (existing) return existing;

      const token = window.prompt(
        "Paste your GitHub fine-grained token. It will be stored only in this browser tab session."
      );

      if (!token) throw new Error("Missing GitHub token.");

      setToken(token.trim());
      return token.trim();
    }

    function headers() {
      return {
        "Accept": "application/vnd.github+json",
        "Authorization": `Bearer ${requireToken()}`,
        "X-GitHub-Api-Version": "2022-11-28"
      };
    }

    function toBase64(str) {
      return btoa(unescape(encodeURIComponent(str)));
    }

    function fromBase64(str) {
      return decodeURIComponent(escape(atob(str.replace(/\n/g, ""))));
    }

    function slugify(text) {
      return text
        .toString()
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "")
        .substring(0, 80);
    }

    function todayISO() {
      return new Date().toISOString().slice(0, 10);
    }

    function escapeHtml(str) {
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function parseFrontMatter(content) {
      const data = {};
      const match = content.match(/^---\s*([\s\S]*?)\s*---/);
      if (!match) return data;

      const yaml = match[1];

      const title = yaml.match(/^title:\s*["']?(.+?)["']?\s*$/m);
      const categories = yaml.match(/^categories:\s*\[(.*?)\]\s*$/m);
      const city = yaml.match(/^city:\s*["']?(.+?)["']?\s*$/m);
      const scientificType = yaml.match(/^scientific_type:\s*["']?(.+?)["']?\s*$/m);

      if (title) data.title = title[1].replace(/^["']|["']$/g, "");
      if (categories) data.categories = categories[1].toLowerCase();
      if (city) data.city = city[1].replace(/^["']|["']$/g, "");
      if (scientificType) data.scientificType = scientificType[1].replace(/^["']|["']$/g, "");

      return data;
    }

    function openModal(title, html, saveHandler) {
      modalTitle.textContent = title;
      modalBody.innerHTML = html;
      currentSaveHandler = saveHandler || null;
      modalSave.style.display = saveHandler ? "inline-block" : "none";
      modal.classList.add("is-visible");
      modal.setAttribute("aria-hidden", "false");
    }

    function closeModal() {
      modal.classList.remove("is-visible");
      modal.setAttribute("aria-hidden", "true");
      modalBody.innerHTML = "";
      currentSaveHandler = null;
    }

    function setStatus(text) {
      const existing = document.getElementById("site-edit-status");
      if (existing) {
        existing.textContent = text;
        return;
      }

      const div = document.createElement("div");
      div.id = "site-edit-status";
      div.className = "site-edit-status";
      div.textContent = text;
      modalBody.prepend(div);
    }

    async function getFile(path) {
      const res = await fetch(`${API_ROOT}/${encodeURIComponent(path).replaceAll("%2F", "/")}?ref=${BRANCH}`, {
        headers: headers()
      });

      if (!res.ok) {
        throw new Error(`Could not read ${path}. GitHub returned ${res.status}.`);
      }

      const data = await res.json();
      return {
        sha: data.sha,
        content: fromBase64(data.content || "")
      };
    }

    async function listDirectory(path) {
      const res = await fetch(`${API_ROOT}/${encodeURIComponent(path).replaceAll("%2F", "/")}?ref=${BRANCH}`, {
        headers: headers()
      });

      if (!res.ok) {
        throw new Error(`Could not list ${path}. GitHub returned ${res.status}.`);
      }

      return await res.json();
    }

    async function getExistingSha(path) {
      const res = await fetch(`${API_ROOT}/${encodeURIComponent(path).replaceAll("%2F", "/")}?ref=${BRANCH}`, {
        headers: headers()
      });

      if (res.status === 404) return null;
      if (!res.ok) return null;

      const data = await res.json();
      return data.sha || null;
    }

    async function putFile(path, content, message, sha) {
      if (!sha) sha = await getExistingSha(path);

      const body = {
        message: message,
        content: toBase64(content),
        branch: BRANCH
      };

      if (sha) body.sha = sha;

      const res = await fetch(`${API_ROOT}/${encodeURIComponent(path).replaceAll("%2F", "/")}`, {
        method: "PUT",
        headers: {
          ...headers(),
          "Content-Type": "application/json"
        },
        body: JSON.stringify(body)
      });

      if (!res.ok) {
        const err = await res.text();
        throw new Error(`Could not save ${path}. GitHub returned ${res.status}: ${err}`);
      }

      return await res.json();
    }

    async function deleteFile(path) {
      const sha = await getExistingSha(path);

      if (!sha) {
        throw new Error(`Could not delete ${path}. File was not found on GitHub.`);
      }

      const res = await fetch(`${API_ROOT}/${encodeURIComponent(path).replaceAll("%2F", "/")}`, {
        method: "DELETE",
        headers: {
          ...headers(),
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          message: `Delete ${path} from site edit mode`,
          sha: sha,
          branch: BRANCH
        })
      });

      if (!res.ok) {
        const err = await res.text();
        throw new Error(`Could not delete ${path}. GitHub returned ${res.status}: ${err}`);
      }

      return await res.json();
    }

    async function editFileByPath(path) {
      openModal(
        `Edit ${path}`,
        `
          <div class="site-edit-field">
            <label>File path</label>
            <input id="edit-file-path" value="${escapeHtml(path)}">
          </div>

          <div class="site-edit-field">
            <label>Content</label>
            <textarea id="edit-file-content">Loading...</textarea>
          </div>
        `,
        async function () {
          const filePath = document.getElementById("edit-file-path").value.trim();
          const content = document.getElementById("edit-file-content").value;
          setStatus("Saving to GitHub...");
          const latest = await getFile(filePath);
          await putFile(filePath, content, `Edit ${filePath} from site edit mode`, latest.sha);
          setStatus("Saved. GitHub Actions will rebuild the site in about 1–2 minutes.");
        }
      );

      try {
        setStatus("Reading file from GitHub...");
        const file = await getFile(path);
        document.getElementById("edit-file-content").value = file.content;
        setStatus("Loaded. Edit the text, then click Save to GitHub.");
      } catch (e) {
        setStatus(e.message);
      }
    }

    async function deleteFileByPath(path) {
      const ok = confirm(`Delete this file from GitHub?\n\n${path}\n\nThis cannot be undone from the website.`);
      if (!ok) return;

      openModal(
        `Delete ${path}`,
        `<div class="site-edit-status">Ready to delete ${escapeHtml(path)}.</div>`,
        async function () {
          setStatus("Deleting from GitHub...");
          await deleteFile(path);
          setStatus("Deleted. GitHub Actions will rebuild the site in about 1–2 minutes. Reopen Manage content to refresh the list.");
        }
      );
    }

    async function editCurrentPage() {
      let path = toolbar.dataset.sourcePath || "index.html";
      if (!path || path === "undefined") path = "index.html";
      await editFileByPath(path);
    }

    async function buildManagerList(kind) {
      setStatus("Loading content from GitHub...");

      let items = [];

      if (kind === "scientific" || kind === "personal") {
        const files = await listDirectory("_posts");
        const markdownFiles = files.filter((f) => f.type === "file" && f.name.endsWith(".md"));

        for (const file of markdownFiles) {
          try {
            const full = await getFile(file.path);
            const meta = parseFrontMatter(full.content);
            const categories = meta.categories || "";

            if (kind === "scientific" && !categories.includes("scientific")) continue;
            if (kind === "personal" && !categories.includes("personal")) continue;

            items.push({
              path: file.path,
              title: meta.title || file.name,
              subtitle: kind === "scientific"
                ? (meta.scientificType || "Scientific post")
                : (meta.city ? `City: ${meta.city}` : "Personal post")
            });
          } catch (e) {
            console.warn(e);
          }
        }
      }

      if (kind === "projects") {
        const files = await listDirectory("_projects");
        const markdownFiles = files.filter((f) => f.type === "file" && f.name.endsWith(".md"));

        for (const file of markdownFiles) {
          try {
            const full = await getFile(file.path);
            const meta = parseFrontMatter(full.content);

            items.push({
              path: file.path,
              title: meta.title || file.name,
              subtitle: "Project"
            });
          } catch (e) {
            console.warn(e);
          }
        }
      }

      if (kind === "publications") {
        const files = await listDirectory("_publications");
        const markdownFiles = files.filter((f) => f.type === "file" && f.name.endsWith(".md"));

        for (const file of markdownFiles) {
          try {
            const full = await getFile(file.path);
            const meta = parseFrontMatter(full.content);

            items.push({
              path: file.path,
              title: meta.title || file.name,
              subtitle: "Paper / publication"
            });
          } catch (e) {
            console.warn(e);
          }
        }
      }

      items.sort((a, b) => b.path.localeCompare(a.path));

      if (items.length === 0) {
        document.getElementById("content-manager-list").innerHTML =
          `<div class="site-edit-status">No items found.</div>`;
        return;
      }

      document.getElementById("content-manager-list").innerHTML = items.map((item, index) => `
        <div class="content-manager-item">
          <div class="content-manager-item-title">${escapeHtml(item.title)}</div>
          <div class="content-manager-item-path">${escapeHtml(item.subtitle)} · ${escapeHtml(item.path)}</div>
          <div class="content-manager-item-actions">
            <button type="button" data-manager-edit="${index}">Edit</button>
            <button type="button" class="danger-button" data-manager-delete="${index}">Delete</button>
          </div>
        </div>
      `).join("");

      document.querySelectorAll("[data-manager-edit]").forEach((button) => {
        button.addEventListener("click", () => {
          const item = items[Number(button.dataset.managerEdit)];
          editFileByPath(item.path);
        });
      });

      document.querySelectorAll("[data-manager-delete]").forEach((button) => {
        button.addEventListener("click", () => {
          const item = items[Number(button.dataset.managerDelete)];
          deleteFileByPath(item.path);
        });
      });

      setStatus(`Loaded ${items.length} item(s) from GitHub.`);
    }

    function manageContent() {
      openModal(
        "Manage content",
        `
          <div class="site-edit-status" id="site-edit-status">
            Choose what you want to manage. This list is read directly from GitHub online.
          </div>

          <div class="content-manager-tabs">
            <button type="button" id="manage-scientific">Scientific posts</button>
            <button type="button" id="manage-personal">Personal posts</button>
            <button type="button" id="manage-projects">Projects</button>
            <button type="button" id="manage-publications">Papers</button>
          </div>

          <div id="content-manager-list" class="content-manager-list"></div>
        `,
        null
      );

      document.getElementById("manage-scientific").addEventListener("click", () => buildManagerList("scientific"));
      document.getElementById("manage-personal").addEventListener("click", () => buildManagerList("personal"));
      document.getElementById("manage-projects").addEventListener("click", () => buildManagerList("projects"));
      document.getElementById("manage-publications").addEventListener("click", () => buildManagerList("publications"));

      buildManagerList("scientific");
    }

    function newScientificPost() {
      const date = todayISO();

      openModal(
        "New scientific post",
        `
          <div class="site-edit-field">
            <label>Title</label>
            <input id="new-title" placeholder="A New Research Note">
          </div>

          <div class="site-edit-field">
            <label>Date</label>
            <input id="new-date" value="${date}">
          </div>

          <div class="site-edit-field">
            <label>Scientific type</label>
            <select id="new-scientific-type">
              <option>Research Notes</option>
              <option>Course Notes</option>
              <option>Discovery Ideas</option>
            </select>
          </div>

          <div class="site-edit-field">
            <label>Tags</label>
            <input id="new-tags" placeholder="Probability, Stochastic Control, Optimal Stopping">
            <div class="site-edit-help">Separate tags with commas.</div>
          </div>

          <div class="site-edit-field">
            <label>Body</label>
            <textarea id="new-body">Write your post here.

The value function satisfies Equation \\eqref{eq:value}.

\\begin{equation}
V(x)
=
\\sup_{\\tau}
\\mathbb E_x\\left[e^{-r\\tau} g(X_\\tau)\\right].
\\label{eq:value}
\\end{equation}
</textarea>
          </div>
        `,
        async function () {
          const title = document.getElementById("new-title").value.trim();
          const postDate = document.getElementById("new-date").value.trim();
          const scientificType = document.getElementById("new-scientific-type").value.trim();
          const tags = document.getElementById("new-tags").value.split(",").map(t => t.trim()).filter(Boolean);
          const body = document.getElementById("new-body").value;

          if (!title) throw new Error("Title is required.");

          const filename = `_posts/${postDate}-${slugify(title)}.md`;

          const content = `---
layout: post
title: "${title.replaceAll('"', '\\"')}"
date: ${postDate}
categories: [scientific]
scientific_type: "${scientificType}"
tags: [${tags.map(t => `"${t.replaceAll('"', '\\"')}"`).join(", ")}]
math: true
---

${body}
`;

          setStatus(`Creating ${filename}...`);
          await putFile(filename, content, `Create scientific post: ${title}`);
          setStatus("Scientific post created. GitHub Actions will rebuild the site in about 1–2 minutes.");
        }
      );
    }

    function newPersonalPost() {
      const date = todayISO();

      openModal(
        "New personal post",
        `
          <div class="site-edit-field">
            <label>Title</label>
            <input id="new-title" placeholder="A Personal Note">
          </div>

          <div class="site-edit-field">
            <label>Date</label>
            <input id="new-date" value="${date}">
          </div>

          <div class="site-edit-field">
            <label>City</label>
            <input id="new-city" value="New York">
          </div>

          <div class="site-edit-field">
            <label>Tags / topics</label>
            <input id="new-tags" placeholder="Travel, Photography, Friends">
          </div>

          <div class="site-edit-field">
            <label>Body</label>
            <textarea id="new-body">Write your personal post here.

You can add an image like this:

![description](/images/uploads/my-image.jpg)
</textarea>
          </div>
        `,
        async function () {
          const title = document.getElementById("new-title").value.trim();
          const postDate = document.getElementById("new-date").value.trim();
          const city = document.getElementById("new-city").value.trim() || "Unspecified";
          const tags = document.getElementById("new-tags").value.split(",").map(t => t.trim()).filter(Boolean);
          const body = document.getElementById("new-body").value;

          if (!title) throw new Error("Title is required.");

          const filename = `_posts/${postDate}-${slugify(title)}.md`;

          const content = `---
layout: post
title: "${title.replaceAll('"', '\\"')}"
date: ${postDate}
categories: [personal]
city: "${city.replaceAll('"', '\\"')}"
tags: [${tags.map(t => `"${t.replaceAll('"', '\\"')}"`).join(", ")}]
---

${body}
`;

          setStatus(`Creating ${filename}...`);
          await putFile(filename, content, `Create personal post: ${title}`);
          setStatus("Personal post created. GitHub Actions will rebuild the site in about 1–2 minutes.");
        }
      );
    }

    function newPaper() {
      const date = todayISO();

      openModal(
        "New paper / publication",
        `
          <div class="site-edit-field">
            <label>Paper title</label>
            <input id="new-paper-title" placeholder="My New Paper">
          </div>

          <div class="site-edit-field">
            <label>Date</label>
            <input id="new-paper-date" value="${date}">
          </div>

          <div class="site-edit-field">
            <label>Authors</label>

You can add chapters:

    function uploadImage() {
      openModal(
        "Upload media / file",
        `
          <div class="site-edit-field">
            <label>Choose file</label>
            <input id="upload-image-file" type="file">
          </div>

          <div class="site-edit-field">
            <label>Destination folder</label>
            <select id="upload-folder">
              <option value="images/uploads">Images</option>
              <option value="videos/uploads">Videos</option>
              <option value="assets/uploads">Animations / HTML / JS / generic assets</option>
              <option value="files">PDFs and documents</option>
            </select>
          </div>

          <div class="site-edit-field">
            <label>Save as filename</label>
            <input id="upload-image-name" placeholder="my-file.png">
            <div class="site-edit-help">
              Examples after upload:<br>
              Image: ![caption](/images/uploads/name.jpg)<br>
              Video: &lt;video controls src="/videos/uploads/name.mp4"&gt;&lt;/video&gt;<br>
              Animation: &lt;iframe src="/assets/uploads/name.html" width="100%" height="520"&gt;&lt;/iframe&gt;<br>
              PDF link: [Download PDF](/files/name.pdf)
            </div>
          </div>
        `,
        async function () {
          const fileInput = document.getElementById("upload-image-file");
          const nameInput = document.getElementById("upload-image-name");
          const folderInput = document.getElementById("upload-folder");

          const file = fileInput.files[0];
          if (!file) throw new Error("Choose a file first.");

          const safeName = (nameInput.value.trim() || file.name).replace(/[^a-zA-Z0-9._-]/g, "-");
          const folder = folderInput.value;
          const path = `${folder}/${safeName}`;

          const dataUrl = await new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(file);
          });

          const base64Content = String(dataUrl).split(",")[1];
          const existingSha = await getExistingSha(path);

          const body = {
            message: `Upload ${path} from site edit mode`,
            content: base64Content,
            branch: BRANCH
          };

          if (existingSha) body.sha = existingSha;

          const res = await fetch(`${API_ROOT}/${encodeURIComponent(path).replaceAll("%2F", "/")}`, {
            method: "PUT",
            headers: {
              ...headers(),
              "Content-Type": "application/json"
            },
            body: JSON.stringify(body)
          });

          if (!res.ok) {
            const err = await res.text();
            throw new Error(`Could not upload file. GitHub returned ${res.status}: ${err}`);
          }

          setStatus(`Uploaded: /${path}`);
        }
      );
    }
