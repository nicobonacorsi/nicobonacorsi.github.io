<style>
  /* INLINE MATH: must stay inside the sentence */
  mjx-container:not([display="true"]),
  mjx-container[display="false"] {
    display: inline !important;
    width: auto !important;
    min-width: 0 !important;
    margin: 0 .08em !important;
    padding: 0 !important;
    text-align: left !important;
    vertical-align: baseline !important;
  }

  mjx-container:not([display="true"]) svg,
  mjx-container[display="false"] svg {
    display: inline !important;
    margin: 0 !important;
    vertical-align: -0.12em !important;
  }

  /* DISPLAY MATH: centered like LaTeX */
  mjx-container[display="true"] {
    display: block !important;
    width: 100% !important;
    text-align: center !important;
    margin: 1.35rem auto !important;
    overflow-x: auto;
    overflow-y: hidden;
  }

  mjx-container[display="true"] svg {
    display: inline-block !important;
    margin-left: auto !important;
    margin-right: auto !important;
  }

  .post-content mjx-container[display="true"],
  .paper-body mjx-container[display="true"],
  .paper-section mjx-container[display="true"],
  .project-body mjx-container[display="true"],
  .project-section mjx-container[display="true"],
  article mjx-container[display="true"] {
    text-align: center !important;
  }
</style>

<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true,
      tags: 'ams'
    },
    options: {
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
    },
    svg: {
      fontCache: 'global'
    }
  };
</script>

<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
