{% unless page.url == "/" %}
<footer class="no-print site-footer">
  <style>
    .site-footer {
      max-width: 1120px;
      margin: 3rem auto 2rem;
      padding: 1.8rem 1.5rem 0;
      text-align: center;
      color: #666666;
      border-top: 1px solid rgba(0,0,0,0.08);
    }

    .site-footer-name {
      font-size: 1.05rem;
      margin-bottom: .85rem;
      color: #444444;
    }

    .site-footer-links {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 1.35rem;
      align-items: center;
      font-size: 1rem;
    }

    .site-footer-link {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      color: #666666;
      text-decoration: none;
    }

    .site-footer-link:hover {
      color: #222222;
    }

    .site-footer-link svg {
      width: 19px;
      height: 19px;
      color: currentColor;
    }

    .footer-stroke-icon {
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .footer-fill-icon {
      fill: currentColor;
    }
  </style>

  <div class="site-footer-name">
    Nicolò Bonacorsi
  </div>

  <div class="site-footer-links">
    <a class="site-footer-link" href="{{ '/cv/' | relative_url }}">
      <svg viewBox="0 0 24 24">
        <path class="footer-stroke-icon" d="M7 3h7l5 5v13H7z"/>
        <path class="footer-stroke-icon" d="M14 3v5h5"/>
        <path class="footer-stroke-icon" d="M9 13h6"/>
        <path class="footer-stroke-icon" d="M9 17h6"/>
      </svg>
      <span>CV</span>
    </a>

    <a class="site-footer-link" href="mailto:nb3328@columbia.edu">
      <svg viewBox="0 0 24 24">
        <path class="footer-stroke-icon" d="M4 6h16v12H4z"/>
        <path class="footer-stroke-icon" d="M4 7l8 6 8-6"/>

      <span>Email</span>

    <a class="site-footer-link" href="https://scholar.google.com/citations?user=Z93cVpAAAAAJ&hl=en">
      <svg viewBox="0 0 24 24">
        <path class="footer-fill-icon" d="M12 3L2 9l10 6 10-6-10-6z"/>
